{% extends 'core/base.html' %}
{% block contenido %}
  <header class="topbar">
    <h2>Evaluar Nuevo Proyecto</h2>
    <div><span>Usuario Ing. Software</span></div>
  </header>

    <div class="content-area">
        <div class="evaluation-wizard">
          <div class="wizard-progress">
            <div class="progress-step active" id="step-badge-1">1. Datos Generales</div>
            <div class="progress-line"></div>
            <div class="progress-step" id="step-badge-2">2. Cuestionario de Criterios</div>
          </div>

          <div class="wizard-step-content active" id="wizard-step-1">
            <form id="project-register-form" class="wizard-form">
              <div class="form-group">
                <label for="proj-name">Nombre del Proyecto</label>
                <input type="text" id="proj-name" placeholder="Ej. Sistema de Facturación E-commerce" required>
              </div>

              <div class="form-group">
                <label for="proj-desc">Descripción del Proyecto</label>
                <textarea id="proj-desc" rows="3" placeholder="Breve descripción del alcance y objetivos del sistema..." required></textarea>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="team-size">Tamaño del Equipo</label>
                  <select id="team-size" required>
                    <option value="" disabled selected>Seleccione...</option>
                    <option value="small">Pequeño (1 - 5 personas)</option>
                    <option value="medium">Mediano (6 - 12 personas)</option>
                    <option value="large">Grande (Más de 12 personas)</option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="req-type">Tipo de Requerimientos Iniciales</label>
                  <select id="req-type" required>
                    <option value="" disabled selected>Seleccione...</option>
                    <option value="stable">Muy Claros y Estables (Poco Cambio)</option>
                    <option value="flexible">Definidos pero con Cambios Esperados</option>
                    <option value="emergent">Altamente Volátiles / Emergentes</option>
                  </select>
                </div>
              </div>

              <div class="form-group">
                <label for="org-context">Contexto Organizacional / Cultura de la Empresa</label>
                <select id="org-context" required>
                  <option value="" disabled selected>Seleccione...</option>
                  <option value="traditional">Estructurada / Corporativa Rigurosa (Prefiere Documentación)</option>
                  <option value="collaborative">Colaborativa / Startup (Orientada a Resultados Rápidos)</option>
                  <option value="regulated">Altamente Regulada (Gubernamental, Auditorías, Enfoque Normativo)</option>
                </select>
              </div>

              <div class="wizard-actions">
                <button type="button" class="btn" id="btn-to-step-2">Siguiente Criterios ➡️</button>
              </div>
            </form>
          </div>

          <div class="wizard-step-content" id="wizard-step-2">
            <div class="wizard-instruction">
              <p id="instruccion-fase">Responda los siguientes factores clave para determinar el grado de agilidad o rigurosidad tradicional necesaria:</p>
            </div>

            <form id="criteria-questions-form" class="wizard-form">
              
              <div id="dynamic-questions-container">
                </div>

              <div class="wizard-actions">
                <button type="button" class="btn secondary-btn" id="btn-back-to-1">⬅️ Atrás</button>
                <button type="submit" class="btn success-btn" id="btn-submit-evaluar">Calcular Recomendación 📊</button>
              </div>
            </form>
          </div>
        </div>
    </div>
{% endblock %}
